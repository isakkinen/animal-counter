<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Animal Slaughter Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="timer-container">
      <div class="timer-label">Page Open Time</div>
      <div id="page-timer">00:00:00</div>
    </div>
    <h2>Animals killed for food since opening this page</h2>
    <ul class="animal-kill-counter" id="animal-counter-list"></ul>

    <div class="sources">
      <h3>Sources</h3>
      <ul id="sources-list"></ul>
    </div>

    <p class="disclaimer">Data based on 2013 statistics. Actual numbers may vary.</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
